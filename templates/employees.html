{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Employee List</h2>
    <a href="/add" class="btn btn-success">Add Employee</a>
</div>
<div class="card shadow">
    <div class="card-body">
        <table class="table table-striped table-hover mt-3">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Emp Code</th>
                    <th>Department</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for emp in employees %}
                <tr>
                    <td>{{ emp[0] }}</td>
                    <td>{{ emp[1] }}</td>
                    <td>{{ emp[2] }}</td>
                    <td>{{ emp[4] }}</td>
                    <td>
                        <a href="/edit/{{ emp[0] }}" class="btn btn-sm btn-warning">Edit</a>
                        <a href="/delete/{{ emp[0] }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this employee?');">Delete</a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="5" class="text-center">No employees found.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
