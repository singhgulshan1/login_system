<!DOCTYPE html>
<html>
<head>
    <title>CRM Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; display: flex; height: 100vh; }
        .left { width: 45%; background: #1a1a2e; color: white; display: flex; flex-direction: column; justify-content: center; padding: 60px; }
        .left h1 { font-size: 28px; margin-bottom: 16px; color: #4CAF50; }
        .left p { color: #aaa; margin-bottom: 30px; line-height: 1.6; }
        .left ul { list-style: none; }
        .left ul li { color: #ccc; padding: 10px 0; border-bottom: 1px solid #333; }
        .right { width: 55%; display: flex; align-items: center; justify-content: center; background: #f5f5f5; }
        .form-box { width: 380px; background: white; padding: 48px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .form-box h2 { font-size: 24px; margin-bottom: 8px; color: #333; }
        .form-box p { color: #888; margin-bottom: 28px; font-size: 14px; }
        label { font-size: 13px; color: #555; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 6px 0 18px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { width: 100%; padding: 13px; background: #4CAF50; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        button:hover { background: #45a049; }
        .error { color: red; font-size: 13px; margin-bottom: 12px; background: #fff0f0; padding: 10px; border-radius: 6px; }
        .footer { margin-top: 20px; text-align: center; color: #aaa; font-size: 12px; }
    </style>
</head>
<body>
    <div class="left">
        <h1>CRM Panel</h1>
        <p>Manage your team with clarity and confidence.</p>
        <ul>
            <li>Employee management & profiles</li>
            <li>Department tracking</li>
            <li>Add / Edit / Delete employees</li>
        </ul>
    </div>
    <div class="right">
        <div class="form-box">
            <h2>Welcome back</h2>
            <p>Sign in to your account to continue</p>
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <label>Employee Code</label>
                <input type="text" name="emp_code" placeholder="e.g. 1001" required>
                <label>Password</label>
                <input type="password" name="password" required>
                <button type="submit">Sign In →</button>
            </form>
            <div class="footer">Having trouble? Contact your administrator.</div>
        </div>
    </div>
</body>
</html>
