{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Edit Employee</h3>
            <a href="/employees" class="btn btn-secondary btn-sm">Back to List</a>
        </div>
        <div class="card shadow">
            <div class="card-body">
                <form method="POST" action="/edit/{{ emp[0] }}">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" name="name" class="form-control" value="{{ emp[1] }}" required>
                    </div>
                    <div class="mb-3">
                        <label>Employee Code</label>
                        <input type="text" class="form-control" value="{{ emp[2] }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label>Department</label>
                        <input type="text" name="department" class="form-control" value="{{ emp[4] }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Employee</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
