<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 80px auto; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #2196F3; color: white; border: none; border-radius: 6px; cursor: pointer; }
        a { color: #2196F3; }
    </style>
</head>
<body>
    <h2>Signup</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="Naam" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Signup karo</button>
    </form>
    <p>Pehle se account hai? <a href="/login">Login karo</a></p>
</body>
</html>
