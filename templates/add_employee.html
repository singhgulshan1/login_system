{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>Add New Employee</h3>
            <a href="/employees" class="btn btn-secondary btn-sm">Back to List</a>
        </div>
        <div class="card shadow">
            <div class="card-body">
                <form method="POST" action="/add">
                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Employee Code (ID)</label>
                        <input type="text" name="emp_code" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label>Department</label>
                        <input type="text" name="department" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Save Employee</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
